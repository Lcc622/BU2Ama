services:
  backend:
    build: ./backend
    ports:
      - "8003:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://192.168.2.130:5174,http://localhost:5174
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.2.130:8003
    command: npm run dev -- --host
    depends_on:
      - backend
