services:
  bu2ama-ep:
    image: bu2ama-backend:latest
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./templates:/app/templates
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://192.168.2.130:5173,http://192.168.2.130:5174,http://localhost:5173,http://localhost:5174
      - STORE_GROUP=EP
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  bu2ama-dmpz:
    image: bu2ama-backend:latest
    build: ./backend
    ports:
      - "8003:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./templates:/app/templates
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://192.168.2.130:5173,http://192.168.2.130:5174,http://localhost:5173,http://localhost:5174
      - STORE_GROUP=DM_PZ
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend-ep:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.2.130:8001
      - VITE_STORE_GROUP=EP
    command: npm run dev -- --host
    depends_on:
      - bu2ama-ep

  frontend-dmpz:
    build: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.2.130:8003
      - VITE_STORE_GROUP=DM_PZ
    command: npm run dev -- --host
    depends_on:
      - bu2ama-dmpz
